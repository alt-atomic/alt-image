modules:
  - name: Install non minimal packages
    type: packages
    body:
      install:
        # Base
        - attr
        - bash-completion
        - bluez
        - command-not-found
        - curl
        - eza
        - iputils
        - man
        - mc
        - nano
        - sudo
        - time
        - unzip
        - vim-enhanced

        # Container
        - docker-compose
        - docker-engine
        - podman-compose
        - sysctl-conf-userns

        # Filesystem
        - exfatprogs
        - f2fs-tools
        - squashfs-tools
        - udftools

        # Firmware
        - firmware-alsa-sof
        - firmware-linux

        # Graphic
        - fontconfig
        - glxinfo
        - mesa-dri-drivers

        # System
        - fprintd
        - jq
        - kbd-data
        - yq

        # Virtualization
        - libvirt
        - lxd
        - open-vm-tools
        - qemu-guest-agent
        - spice-vdagent
        - spice-webdavd
        - virtiofsd
