modules:
  - type: packages
    body:
      update: true
      upgrade: true

  - name: Set variant to branding
    type: branding
    body:
      release-overrides:
        VARIANT: ${{ Env.VARIANT }}
        VARIANT_ID: ${{ Env.BUILD_TYPE }}

  - name: Install packages
    type: include
    body:
      targets:
        - packages.yml

  - name: Copy root
    type: copy
    body:
      source: root
      destination: /
      replace: true

  - name: Settings image
    type: include
    body:
      targets:
        - settings.yml
        - systemd.yml

  - name: Cleanup
    type: include
    body:
      targets:
        - /usr/share/apm/includes/common/cleanup.yml
