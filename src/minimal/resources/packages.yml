modules:
  - name: Install multiarch packages
    type: packages
    body:
      install:
        # Base
        - coreutils
        - passwd
        - shadow-change
        - su
        - tzdata
        - which
        - pam-limits-off
        # used by fix-dracut and fix-grub
        - wget
        # used by check_var_directory and init-ostree.sh
        - rsync
        # for grub-common
        - libfreetype

        # Boot
        - alt-uefi-certs
        - cryptsetup
        - dracut
        - efibootmgr
        - efitools
        - efivar
        - grub
        - grub-btrfs
        - grub-efi
        - shim-unsigned

        # Container
        - bootupd
        - composefs
        - containers-common
        - fuse-overlayfs
        # used by bootc
        - bubblewrap
        - podman
        - skopeo

        # Filesystem
        - btrfs-progs
        - dosfstools
        - e2fsprogs
        - xfsprogs

        # System
        - chrony
        - kbd
        - libselinux
        - losetup
        - mount
        - NetworkManager
        - ostree
        - policycoreutils
        - sfdisk
        - systemd
        - zram-generator
        - libnss-altfiles

  - name: Install x86_64-only packages
    type: packages
    if: Env.ARCH == 'x86_64'
    body:
      install:
        - shim-signed
        - grub-pc
