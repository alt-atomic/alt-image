modules:
  - name: Install multiarch packages
    type: packages
    if: Env.BUILD_TYPE == 'minimal'
    body:
      install:
        # Base
        - coreutils
        - passwd
        - shadow-change
        - su
        - tzdata
        - which
        - pam-limits-off
        # used by fix-dracut and fix-grub
        - wget
        # used by check_var_directory and init-ostree.sh
        - rsync
        # for grub-common
        - libfreetype

        # Boot
        - alt-uefi-certs
        - cryptsetup
        - dracut
        - efibootmgr
        - efitools
        - efivar
        - grub
        - grub-btrfs
        - grub-efi
        - shim-unsigned

        # Container
        - bootupd
        - composefs
        - containers-common
        - fuse-overlayfs
        # used by bootc
        - podman
        - skopeo
        #

        # Filesystem
        - btrfs-progs
        - dosfstools
        - e2fsprogs
        - xfsprogs

        # System
        - chrony
        - kbd
        - libselinux
        - losetup
        - mount
        - NetworkManager
        - ostree
        - policycoreutils
        - sfdisk
        - systemd
        - zram-generator

  - name: Install non minimal packages
    type: packages
    if: Env.BUILD_TYPE != 'minimal'
    body:
      install:
        # Base
        - attr
        - bash-completion
        - bluez
        - bubblewrap
        - command-not-found
        - curl
        - eza
        - iputils
        - man
        - mc
        - nano
        - sudo
        - time
        - unzip
        - vim-enhanced

        # Container
        - podman-compose
        - sysctl-conf-userns

        # Filesystem
        - exfatprogs
        - f2fs-tools
        - squashfs-tools
        - udftools

        # Firmware
        - firmware-alsa-sof
        - firmware-linux

        # Graphic
        - fontconfig
        - glxinfo
        - mesa-dri-drivers

        # System
        - fprintd
        - jq
        - kbd-data
        - yq

        # Virtualization
        - libvirt
        - lxd
        - open-vm-tools
        - qemu-guest-agent
        - spice-vdagent
        - spice-webdavd
        - virtiofsd

  - name: Install x86_64-only packages
    type: packages
    if: Env.ARCH == 'x86_64' && Env.BUILD_TYPE == 'minimal'
    body:
      install:
        - shim-signed
        - grub-pc
