modules:
  - type: systemd
    if: Env.BUILD_TYPE != 'minimal'
    body:
      targets:
        - libvirtd
      enabled: true

  - type: systemd
    if: Env.BUILD_TYPE == 'minimal'
    body:
      targets:
        - ostree-remount
        - NetworkManager
        - chrony
        - podman.socket
        - sync-users.service
        - sync-directory.service
        - fstrim.timer
      enabled: true
