name: Build nightly images

on:
  workflow_dispatch:
  schedule:
  # Every day at 4 a.m.
  - cron: '0 4 * * *'
  push:
    branches:
    - 'nightly-*'
    - 'main'
  pull_request:

env:
  LOCAL_BUILD_NAME: localhost/core
  REGISTRY: altlinux.space

  PRETTY_NAME: ALT Atomic Core Nightly
  VENDOR: ALT Atomic Team
  DESCRIPTION: Nightly Core image for ALT Atomic distros
  LICENSES: GPL-3.0-or-later
  URL: atomic.alt-gnome.ru
  AUTHORS: ALT Atomic Team

jobs:
  gather-build-data:
    name: Gather build data
    runs-on: als-tiny

    outputs:
      date: ${{ steps.date.outputs.date }}
      year: ${{ steps.date.outputs.year }}
      month: ${{ steps.date.outputs.month }}
      day: ${{ steps.date.outputs.day }}
      pretty-date: ${{ steps.date.outputs.pretty-date }}
      commit: ${{ steps.get_commit.outputs.commit }}
      channel: ${{ github.ref_name == 'main' && 'nightly' || 'nightly-branch' }}
      tag: ${{ github.ref_name == 'main' && 'latest' || github.ref_name }}
      aliases: ${{ github.ref_name == 'main' && format('{0} {1}', steps.date.outputs.date, steps.get_commit.outputs.commit) || steps.get_commit.outputs.commit }}

    steps:
    - name: Get date
      id: date
      uses: alt-atomic/actions/parse-date@main

    - name: Checkout repository
      uses: actions/checkout@v4

    - id: get_commit
      name: Get current commit
      run: |
        echo "commit=$(git rev-parse HEAD)" >> $FORGEJO_OUTPUT

  build:
    name: Build ${{ matrix.arch }} images
    needs:
    - gather-build-data
    runs-on: ${{ matrix.runner }}
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    strategy:
      matrix:
        arch:
        - amd64
        - arm64
        include:
        - arch: amd64
          larch: x86_64
          runner: als-huge
        - arch: arm64
          larch: aarch64
          runner: self-hosted-arm64-huge

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build minimal image
      uses: alt-atomic/actions/build-and-push@c882944ee9b49d04f3f2030aa47c435515a66657
      with:
        image-name: ${{ format('{0}-minimal/{1}/{2}', github.repository, needs.gather-build-data.outputs.channel, matrix.arch) }}
        image-tag: ${{ needs.gather-build-data.outputs.tag }}
        image-aliases: ${{ needs.gather-build-data.outputs.aliases }}
        arch: ${{ matrix.arch }}
        containerfile-path: ./container-files/main-minimal
        local-build-name: localhost/core-minimal

        registry-password: ${{ secrets.REGISTRY_TOKEN }}
        push-enabled: ${{ github.event_name != 'pull_request' }}
        rechunk-enabled: ${{ github.event_name != 'pull_request' }}

        pretty-name: ${{ env.PRETTY_NAME }}
        version: ${{ needs.gather-build-data.outputs.date }}
        vendor: ${{ env.VENDOR }}
        description: ${{ env.DESCRIPTION }}
        licenses: ${{ env.LICENSES }}
        url: ${{ env.URL }}
        authors: ${{ env.AUTHORS }}
        repo-date: ${{ needs.gather-build-data.outputs.pretty-date }}

        build-args: |
          YEAR=${{ needs.gather-build-data.outputs.year }}
          MONTH=${{ needs.gather-build-data.outputs.month }}
          DAY=${{ needs.gather-build-data.outputs.day }}
          IMAGE_TYPE=nightly
          IMAGE=registry.altlinux.org/sisyphus/base:latest
          ARCH=${{ matrix.larch }}
          VERSION=${{ needs.gather-build-data.outputs.date }}

        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}

    - name: Build default image
      uses: alt-atomic/actions/build-and-push@c882944ee9b49d04f3f2030aa47c435515a66657
      with:
        image-name: ${{ format('{0}/{1}/{2}', github.repository, needs.gather-build-data.outputs.channel, matrix.arch) }}
        image-tag: ${{ needs.gather-build-data.outputs.tag }}
        image-aliases: ${{ needs.gather-build-data.outputs.aliases }}
        arch: ${{ matrix.arch }}
        containerfile-path: ./container-files/main-default
        local-build-name: localhost/core

        registry-password: ${{ secrets.REGISTRY_TOKEN }}
        push-enabled: ${{ github.event_name != 'pull_request' }}
        rechunk-enabled: ${{ github.event_name != 'pull_request' }}

        pretty-name: ${{ env.PRETTY_NAME }}
        version: ${{ needs.gather-build-data.outputs.date }}
        vendor: ${{ env.VENDOR }}
        description: ${{ env.DESCRIPTION }}
        licenses: ${{ env.LICENSES }}
        url: ${{ env.URL }}
        authors: ${{ env.AUTHORS }}
        repo-date: ${{ needs.gather-build-data.outputs.pretty-date }}

        build-args: |
          YEAR=${{ needs.gather-build-data.outputs.year }}
          MONTH=${{ needs.gather-build-data.outputs.month }}
          DAY=${{ needs.gather-build-data.outputs.day }}
          IMAGE_TYPE=nightly
          IMAGE=localhost/core-minimal
          ARCH=${{ matrix.larch }}
          VERSION=${{ needs.gather-build-data.outputs.date }}

        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  manifest:
    name: Multiarch ${{ matrix.name }} manifest push
    needs:
    - build
    - gather-build-data
    if: github.event_name != 'pull_request'
    runs-on: als-tiny
    container:
      image: altlinux.space/alt-atomic/builder-image:sisyphus
    strategy:
      matrix:
        include:
        - name: minimal
          suffix: -minimal
        - name: default
          suffix: ''

    steps:
    - name: Create manifest
      uses: alt-atomic/actions/create-manifest@d1b311b7bc99d19264377b009549632312e525c1
      with:
        registry: ${{ env.REGISTRY }}
        registry-username: "<token>"
        registry-password: ${{ secrets.REGISTRY_TOKEN }}
        image-name: ${{ format('{0}{1}/{2}', github.repository, matrix.suffix, needs.gather-build-data.outputs.channel) }}
        arch-tags: amd64 arm64
        image-wildcard: ${{ format('{0}{1}/{2}/@ARCH@:{3}', github.repository, matrix.suffix, needs.gather-build-data.outputs.channel, needs.gather-build-data.outputs.tag) }}
        image-tag: ${{ needs.gather-build-data.outputs.tag }}
        image-aliases: ${{ needs.gather-build-data.outputs.aliases }}
        cosign-image-sign: ${{ secrets.IMAGE_SIGN }}
        cosign-password: ${{ secrets.COSIGN_PASSWORD }}

  run-derivatives:
    name: Run ${{ matrix.image }} build-nightly workflow
    needs:
    - manifest
    if: github.event_name == 'schedule'
    runs-on: als-tiny
    strategy:
      matrix:
        image:
        - kyanite
        - onyx

    steps:
    - name: Trigger rebuild
      uses: actions/forgejo-script@v1
      env:
        IMAGE: ${{ matrix.image }}
      with:
        github-token: ${{ secrets.REBUILD }}
        script: |
          await forgejo.repos.dispatchWorkflow(
            "alt-atomic",
            process.env.IMAGE,
            "build-nightly.yml",
            {
              ref: "main",
            },
          );
